version: '3.8'
services:
  db:
    image: docker.io/library/mariadb:10
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: absensi_siswa
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
  phpmyadmin:
    image: docker.io/library/phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpass
    ports:
      - "8083:80"
    depends_on:
      - db
  web:
    image: docker.io/library/php:8.2-apache
    ports:
      - "8082:80"
    environment:
      DOCKER_CONTAINER: 1
    volumes:
      - .:/var/www/html
      - ./docker/apache-performance.conf:/etc/apache2/conf-enabled/performance.conf
      - ./docker/php-performance.ini:/usr/local/etc/php/conf.d/performance.ini
    command: bash -c "docker-php-ext-install mysqli && a2enmod expires headers && apache2-foreground"
    depends_on:
      - db

volumes:
  db_data:
